fr:
  # Traductions pour les erreurs de validation ActiveRecord
  errors:
    messages:
      taken: "est déjà utilisé"
      blank: "ne peut pas être vide"
      too_short: "est trop court (minimum %{count} caractères)"
      too_long: "est trop long (maximum %{count} caractères)"
      invalid: "est invalide"
      confirmation: "ne correspond pas"
      not_a_number: "n'est pas un nombre"

  activerecord:
    errors:
      messages:
        taken: "est déjà utilisé"
        blank: "ne peut pas être vide"
        too_short: "est trop court (minimum %{count} caractères)"
        too_long: "est trop long (maximum %{count} caractères)"
        invalid: "est invalide"
        confirmation: "ne correspond pas"
        not_a_number: "n'est pas un nombre"
        too_long: "est trop long (maximum %{count} caractères)"
        password_too_short: "est trop court (minimum %{count} caractères)"

    # Noms des modèles traduits
    models:
      user: "utilisateur"
      profil: "profil"

    # Noms des attributs traduits (utilisés dans les messages d'erreur)
    attributes:
      user:
        email: "E-mail"
        password: "Mot de passe"
        password_confirmation: "Confirmation du mot de passe"
        first_name: "Prénom"
        last_name: "Nom"
      profil:
        first_name: "Prénom"
        last_name: "Nom"
        avatar: "Avatar"

  # Formats de date utilisés avec I18n.l(date, format: :xxx)
  date:
    formats:
      default: "%d/%m/%Y"
      short:   "%d %b %Y"
      long:    "%d %B %Y"
    month_names:
      - ~
      - janvier
      - février
      - mars
      - avril
      - mai
      - juin
      - juillet
      - août
      - septembre
      - octobre
      - novembre
      - décembre
    abbr_month_names:
      - ~
      - jan.
      - fév.
      - mars
      - avr.
      - mai
      - juin
      - juil.
      - août
      - sept.
      - oct.
      - nov.
      - déc.
    day_names:
      - dimanche
      - lundi
      - mardi
      - mercredi
      - jeudi
      - vendredi
      - samedi
    abbr_day_names:
      - dim.
      - lun.
      - mar.
      - mer.
      - jeu.
      - ven.
      - sam.

  # Formats de temps
  time:
    formats:
      default: "%H:%M"
      short:   "%H:%M"
      long:    "%d %B %Y à %H:%M"

  # Traductions pour time_ago_in_words (utilisé dans les notifications)
  datetime:
    distance_in_words:
      half_a_minute: "une demi-minute"
      less_than_x_seconds:
        one: "moins d'une seconde"
        other: "moins de %{count} secondes"
      x_seconds:
        one: "1 seconde"
        other: "%{count} secondes"
      less_than_x_minutes:
        one: "moins d'une minute"
        other: "moins de %{count} minutes"
      x_minutes:
        one: "1 minute"
        other: "%{count} minutes"
      about_x_hours:
        one: "environ 1 heure"
        other: "environ %{count} heures"
      x_days:
        one: "1 jour"
        other: "%{count} jours"
      about_x_months:
        one: "environ 1 mois"
        other: "environ %{count} mois"
      x_months:
        one: "1 mois"
        other: "%{count} mois"
      about_x_years:
        one: "environ 1 an"
        other: "environ %{count} ans"
      over_x_years:
        one: "plus d'1 an"
        other: "plus de %{count} ans"
      almost_x_years:
        one: "presque 1 an"
        other: "presque %{count} ans"
